name: Dev Build

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained single-file exe
        run: |
          dotnet publish WinManager.csproj `
            -r win-x64 `
            -c Release `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --self-contained true `
            -o ./publish

      - name: Update dev-latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Dev build (latest)
          prerelease: true
          files: ./publish/WinManager.exe
          body: |
            Automatyczny build z galezi dev — commit ${{ github.sha }}.
            Wersja testowa, nie do normalnego uzytku.
